<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거래명세서 포털</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
  }

  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f5f5f5;
  }

  .login-card {
    background: #fff;
    border-radius: 12px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }

  .login-logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 32px;
  }

  .login-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .login-sub {
    font-size: 14px;
    color: #888;
    margin-bottom: 36px;
  }

  .field { margin-bottom: 20px; }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: #444;
  }

  .field input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus { border-color: #1a1a1a; }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
  }

  .btn-login:hover { background: #333; }
  .btn-login:disabled { background: #999; cursor: not-allowed; }

  .error-msg {
    margin-top: 16px;
    padding: 10px 14px;
    background: #fff0f0;
    border-radius: 8px;
    color: #d00;
    font-size: 13px;
    display: none;
  }

  #dashboard-screen { display: none; }

  .topbar {
    background: #fff;
    border-bottom: 1px solid #eee;
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
  }

  .topbar-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .user-badge {
    font-size: 13px;
    color: #666;
  }

  .btn-logout {
    padding: 7px 14px;
    background: transparent;
    border: 1.5px solid #e0e0e0;
    border-radius: 7px;
    font-size: 13px;
    cursor: pointer;
    color: #444;
    transition: all 0.15s;
  }

  .btn-logout:hover { border-color: #aaa; color: #111; }

  .layout {
    display: flex;
    margin-top: 56px;
    min-height: calc(100vh - 56px);
  }

  /* 사이드바 */
  .sidebar {
    width: 220px;
    background: #fff;
    border-right: 1px solid #eee;
    padding: 24px 0;
    position: fixed;
    top: 56px;
    bottom: 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 0 16px;
    margin-bottom: 8px;
  }

  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 8px 8px 4px;
  }

  .sidebar-item {
    display: block;
    width: 100%;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 14px;
    color: #444;
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }

  .sidebar-item:hover { background: #f5f5f5; color: #111; }
  .sidebar-item.active { background: #1a1a1a; color: #fff; font-weight: 600; }

  .sidebar-sub {
    padding-left: 20px;
  }

  /* 메인 콘텐츠 */
  .main {
    margin-left: 220px;
    flex: 1;
    padding: 40px 32px;
    max-width: 960px;
  }

  .page-header { margin-bottom: 28px; }

  .page-header h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .page-header p {
    font-size: 14px;
    color: #888;
  }

  .table-wrap {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    background: #fafafa;
    border-bottom: 1px solid #eee;
  }

  th {
    padding: 13px 16px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #999;
  }

  td {
    padding: 14px 16px;
    font-size: 14px;
    border-bottom: 1px solid #f2f2f2;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .btn-download {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }

  .btn-download:hover { background: #333; }

  .btn-no-url {
    padding: 6px 14px;
    background: #f0f0f0;
    color: #bbb;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    cursor: not-allowed;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #aaa;
    font-size: 14px;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #aaa;
    font-size: 14px;
  }

  .company-tag {
    font-size: 22px;
    font-weight: 700;
    color: #888;
    margin-right: 6px;
  }

  .amount {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .content-section { display: none; }
  .content-section.active { display: block; }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">NAVER I&S</div>
    <div class="login-title">거래명세서 포털</div>
    <div class="login-sub">이메일과 비밀번호로 로그인하세요</div>
    <div class="field">
      <label>이메일</label>
      <input type="email" id="email" placeholder="email@example.com" />
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn-login" id="login-btn" onclick="login()">로그인</button>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashboard-screen">
  <div class="topbar">
    <div class="topbar-title"><span id="topbar-company"></span>거래명세서 포털</div>
    <div class="topbar-right">
      <span class="user-badge" id="user-email"></span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="layout">
    <!-- 사이드바 -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">메뉴</div>
        <button class="sidebar-item active" onclick="showSection('invoice')">📄 용역비</button>
        <button class="sidebar-item" onclick="showSection('direct')">💰 직접비</button>
        <div class="sidebar-sub">
          <button class="sidebar-item" onclick="showSection('direct-detail')">📋 직접비(상세내역)</button>
        </div>
      </div>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="main">

      <!-- 용역비 섹션 -->
      <div id="section-invoice" class="content-section active">
        <div class="page-header">
          <h1><span class="company-tag" id="company-tag"></span>청구서 목록</h1>
          <p>등록된 거래명세서를 최신순으로 확인하세요</p>
        </div>
        <div class="table-wrap">
          <div class="loading" id="loading-invoice">불러오는 중...</div>
          <table id="invoice-table" style="display:none">
            <thead>
              <tr>
                <th>일자</th>
                <th>파일명</th>
                <th>비고</th>
                <th>파일</th>
              </tr>
            </thead>
            <tbody id="invoice-body"></tbody>
          </table>
          <div class="empty-state" id="empty-invoice" style="display:none">등록된 청구서가 없습니다</div>
        </div>
      </div>

      <!-- 직접비 섹션 -->
      <div id="section-direct" class="content-section">
        <div class="page-header">
          <h1><span class="company-tag2"></span>직접비 월별 현황</h1>
          <p>월별 직접비 금액을 확인하세요</p>
        </div>
        <div class="table-wrap">
          <div class="loading" id="loading-direct">불러오는 중...</div>
          <table id="direct-table" style="display:none">
            <thead>
              <tr>
                <th>연도</th>
                <th>월</th>
                <th>청구유형</th>
                <th>서비스</th>
                <th style="text-align:right">금액</th>
              </tr>
            </thead>
            <tbody id="direct-body"></tbody>
          </table>
          <div class="empty-state" id="empty-direct" style="display:none">등록된 직접비가 없습니다</div>
        </div>
      </div>

      <!-- 직접비 상세내역 섹션 -->
      <div id="section-direct-detail" class="content-section">
        <div class="page-header">
          <h1><span class="company-tag3"></span>직접비 상세내역</h1>
          <p>직접비 항목별 상세 내역을 확인하세요</p>
        </div>
        <div class="table-wrap">
          <div class="loading" id="loading-direct-detail">불러오는 중...</div>
          <table id="direct-detail-table" style="display:none">
            <thead>
              <tr>
                <th>연도</th>
                <th>월</th>
                <th>직접비코드</th>
                <th>서비스</th>
                <th>직접비항목</th>
                <th>청구유형</th>
                <th>배부기준</th>
                <th>청구법인</th>
                <th style="text-align:right">금액</th>
              </tr>
            </thead>
            <tbody id="direct-detail-body"></tbody>
          </table>
          <div class="empty-state" id="empty-direct-detail" style="display:none">등록된 상세내역이 없습니다</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://mjudvolcvvedsgutpdnz.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_JHuaac3MqEOdIkxtikIneQ_XsDsZOeA';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentCompanyId = null;

window.onload = async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) showDashboard(session.user);
};

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');

  if (!email || !password) { showError('이메일과 비밀번호를 입력해주세요'); return; }

  btn.disabled = true;
  btn.textContent = '로그인 중...';
  errEl.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    showError('이메일 또는 비밀번호가 올바르지 않습니다');
    btn.disabled = false;
    btn.textContent = '로그인';
    return;
  }

  showDashboard(data.user);
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function showDashboard(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard-screen').style.display = 'block';
  document.getElementById('user-email').textContent = user.email;

  const { data: userData } = await sb
    .from('Users')
    .select('company_id, Companies(회사명)')
    .eq('auth_id', user.id)
    .single();

  if (userData && userData.Companies && userData.Companies['회사명']) {
    const companyName = `[${userData.Companies['회사명']}] `;
    document.getElementById('company-tag').textContent = companyName;
    document.getElementById('topbar-company').textContent = companyName;
    document.querySelectorAll('.company-tag2, .company-tag3').forEach(el => el.textContent = companyName);
    currentCompanyId = userData.company_id;
  }

  await loadInvoices();
}

function showSection(name) {
  document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));

  document.getElementById(`section-${name}`).classList.add('active');
  event.currentTarget.classList.add('active');

  if (name === 'direct') loadDirect();
  if (name === 'direct-detail') loadDirectDetail();
}

async function loadInvoices() {
  document.getElementById('loading-invoice').style.display = 'block';
  document.getElementById('invoice-table').style.display = 'none';
  document.getElementById('empty-invoice').style.display = 'none';

  const { data, error } = await sb
    .from('청구서')
    .select('*')
    .order('일자', { ascending: false });

  document.getElementById('loading-invoice').style.display = 'none';

  if (error || !data || data.length === 0) {
    document.getElementById('empty-invoice').style.display = 'block';
    return;
  }

  const tbody = document.getElementById('invoice-body');
  tbody.innerHTML = '';

  data.forEach(row => {
    const tr = document.createElement('tr');
    const downloadBtn = row['URL']
      ? `<a class="btn-download" href="${row['URL']}" target="_blank">↓ 다운로드</a>`
      : `<button class="btn-no-url" disabled>파일 없음</button>`;

    tr.innerHTML = `
      <td>${row['일자'] || '-'}</td>
      <td>${row['파일명'] || '-'}</td>
      <td>${row['비고'] || '-'}</td>
      <td>${downloadBtn}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('invoice-table').style.display = 'table';
}

async function loadDirect() {
  document.getElementById('loading-direct').style.display = 'block';
  document.getElementById('direct-table').style.display = 'none';
  document.getElementById('empty-direct').style.display = 'none';

  const { data, error } = await sb
    .from('직접비')
    .select('연도, 경상월, 청구유형, 서비스, 금액')
    .order('연도', { ascending: true })
    .order('경상월', { ascending: true });

  document.getElementById('loading-direct').style.display = 'none';

  if (error || !data || data.length === 0) {
    document.getElementById('empty-direct').style.display = 'block';
    return;
  }

  const tbody = document.getElementById('direct-body');
  tbody.innerHTML = '';

  data.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row['연도'] || '-'}</td>
      <td>${row['경상월'] || '-'}</td>
      <td>${row['청구유형'] || '-'}</td>
      <td>${row['서비스'] || '-'}</td>
      <td class="amount">${row['금액'] ? row['금액'].toLocaleString() + '원' : '-'}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('direct-table').style.display = 'table';
}

async function loadDirectDetail() {
  document.getElementById('loading-direct-detail').style.display = 'block';
  document.getElementById('direct-detail-table').style.display = 'none';
  document.getElementById('empty-direct-detail').style.display = 'none';

  const { data, error } = await sb
    .from('직접비')
    .select('*')
    .order('연도', { ascending: true })
    .order('경상월', { ascending: true });

  document.getElementById('loading-direct-detail').style.display = 'none';

  if (error || !data || data.length === 0) {
    document.getElementById('empty-direct-detail').style.display = 'block';
    return;
  }

  const tbody = document.getElementById('direct-detail-body');
  tbody.innerHTML = '';

  data.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row['연도'] || '-'}</td>
      <td>${row['경상월'] || '-'}</td>
      <td>${row['직접비코드'] || '-'}</td>
      <td>${row['서비스'] || '-'}</td>
      <td>${row['직접비항목'] || '-'}</td>
      <td>${row['청구유형'] || '-'}</td>
      <td>${row['배부기준'] || '-'}</td>
      <td>${row['청구법인'] || '-'}</td>
      <td class="amount">${row['금액'] ? row['금액'].toLocaleString() + '원' : '-'}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('direct-detail-table').style.display = 'table';
}

async function logout() {
  await sb.auth.signOut();
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('email').value = '';
  document.getElementById('password').value = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
